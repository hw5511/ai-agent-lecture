<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<meta http-equiv="refresh" content="5; url=https://hw5511.github.io/ai-agent-class/consultation/">
<title>주소가 변경되었습니다</title>
<style>
  :root{--ink:#222;--mut:#666;--accent:#5b5bd6;--bg:#f6f6fb;--line:#e6e6ef}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--ink);font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic','Segoe UI',sans-serif;
    display:flex;align-items:center;justify-content:center;padding:24px}
  .card{background:#fff;border:1px solid var(--line);border-radius:16px;max-width:560px;width:100%;
    padding:44px 40px;text-align:center;box-shadow:0 8px 30px rgba(40,40,80,.08)}
  h1{font-size:25px;margin:0 0 12px;letter-spacing:-.02em}
  p{margin:8px 0;color:var(--mut);line-height:1.7}
  .btn{display:inline-block;margin-top:20px;padding:13px 26px;background:var(--accent);color:#fff;
    text-decoration:none;border-radius:10px;font-weight:700}
  .btn:hover{opacity:.9}
  .muted{font-size:13px;color:#999;margin-top:18px}
  .url{font-size:13px;word-break:break-all;color:var(--accent)}
</style>
</head>
<body>
  <div class="card">
    <h1>주소가 변경되었습니다</h1>
    <p>이 상담자료 페이지는 새 주소로 이전되었습니다.</p>
    <a class="btn" href="https://hw5511.github.io/ai-agent-class/consultation/">새 주소로 이동 &rarr;</a>
    <p class="url">https://hw5511.github.io/ai-agent-class/consultation/</p>
    <p class="muted">5초 후 자동으로 이동합니다. 즐겨찾기를 새 주소로 갱신해 주세요.</p>
  </div>
</body>
</html>
